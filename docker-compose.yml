services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: webhook-kafka
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # HOST listener for tools on localhost:9092, DOCKER listener for other containers.
      KAFKA_LISTENERS: HOST://:9092,DOCKER://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,HOST:PLAINTEXT,DOCKER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kafka-init:
    image: apache/kafka:3.9.0
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for t in events retries dead-letter; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 \
            --create --if-not-exists --topic "$$t" --partitions 3 --replication-factor 1
        done

  api:
    build:
      context: .
      args:
        SERVICE: api
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:29092
      API_ADDR: ":8000"
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        SERVICE: worker
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:29092
    deploy:
      replicas: 3
    restart: unless-stopped

  retry-worker:
    build:
      context: .
      args:
        SERVICE: retry-worker
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:29092
    restart: unless-stopped

  webhook-accept-api:
    build:
      context: .
      args:
        SERVICE: webhook-accept-api
    environment:
      RECEIVER_ADDR: ":8080"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  kafka-data:
